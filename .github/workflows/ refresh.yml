name: Refresh briefing

# RSS feeds for vendor/tech beats + Claude web_search for consulting sources
# (McKinsey, BCG, Gartner etc. block RSS readers — web_search reaches them directly)

on:
  schedule:
    - cron: "7 13 * * *"   # 13:07 UTC daily = 9:07am US Eastern (EDT/UTC-4)
  workflow_dispatch: {}     # run manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Assemble briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refresh.mjs

      - name: Commit updated feed
        run: |
          git config user.name "signal-desk-bot"
          git config user.email "actions@github.com"
          git add data/feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh briefing ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
