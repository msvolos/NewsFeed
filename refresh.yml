name: Refresh briefing

# Runs on a schedule and on demand. Pulls fresh stories via Claude + web search
# and commits the updated data/feed.json so GitHub Pages serves it.

on:
  schedule:
    # 11:00 UTC daily ≈ 6-7am US Eastern. Edit to taste (https://crontab.guru).
    - cron: "0 11 * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab

permissions:
  contents: write # required to commit the updated feed

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Assemble briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refresh.mjs

      - name: Commit updated feed
        run: |
          git config user.name "signal-desk-bot"
          git config user.email "actions@github.com"
          git add data/feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh briefing ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
